<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drone Map Simulation</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="canvas-container"></div>

  <div id="control-panel">
    <h2>🛸 Drone Control</h2>

    <section class="panel-section">
      <h3>Fly To</h3>
      <div class="input-row">
        <label>Lat <input type="number" id="fly-lat" step="0.0001" value="60.1620" /></label>
        <label>Lon <input type="number" id="fly-lon" step="0.0001" value="24.8900" /></label>
      </div>
      <button id="fly-btn">🚀 Fly</button>
    </section>

    <section class="panel-section">
      <h3>Speed</h3>
      <div class="input-row">
        <input type="range" id="speed-slider" min="1" max="100" value="10" />
        <span id="speed-value">10 m/s</span>
      </div>
    </section>

    <section class="panel-section">
      <h3>Waypoints</h3>
      <div class="input-row">
        <label>Lat <input type="number" id="wp-lat" step="0.0001" value="60.1620" /></label>
        <label>Lon <input type="number" id="wp-lon" step="0.0001" value="24.8900" /></label>
      </div>
      <div class="button-row">
        <button id="add-wp-btn">+ Add</button>
        <button id="clear-wp-btn">Clear</button>
        <button id="fly-wp-btn">▶ Fly Waypoints</button>
      </div>
      <ul id="waypoint-list"></ul>
    </section>

    <section class="panel-section">
      <h3>Status</h3>
      <div id="status-display">
        <div>Lat: <span id="status-lat">—</span></div>
        <div>Lon: <span id="status-lon">—</span></div>
        <div>Speed: <span id="status-speed">—</span></div>
        <div>State: <span id="status-state">Idle</span></div>
      </div>
    </section>

    <section class="panel-section">
      <h3>Backend</h3>
      <div id="ws-status">Disconnected</div>
    </section>
  </div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
