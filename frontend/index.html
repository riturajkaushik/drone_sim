<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drone Map Simulation</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="canvas-container"></div>

  <div id="control-panel">
    <h2>🛸 Drone Control</h2>

    <section class="panel-section">
      <h3>Capture Area</h3>
      <div class="input-row">
        <label>X <input type="number" id="capture-x" step="1" min="0" value="0" placeholder="meters" /></label>
        <label>Y <input type="number" id="capture-y" step="1" min="0" value="0" placeholder="meters" /></label>
        <button id="set-capture-btn">Set</button>
      </div>
    </section>

    <section class="panel-section">
      <h3>Drones</h3>
      <div class="input-row">
        <label>Lat <input type="number" id="drone-lat" step="0.0001" value="60.1620" /></label>
        <label>Lon <input type="number" id="drone-lon" step="0.0001" value="24.8900" /></label>
      </div>
      <button id="add-drone-btn">+ Add Drone</button>
      <div id="drone-error" class="error-message"></div>
      <ul id="drone-list"></ul>
    </section>

    <section class="panel-section">
      <h3>Drone Size</h3>
      <div class="input-row">
        <input type="range" id="drone-scale-slider" min="10" max="300" value="100" />
        <span id="drone-scale-value">100%</span>
      </div>
    </section>

    <section class="panel-section">
      <h3>Fly To</h3>
      <div class="input-row">
        <label>Drone <select id="fly-drone-select"></select></label>
      </div>
      <div class="input-row">
        <label>Lat <input type="number" id="fly-lat" step="0.0001" value="60.1620" /></label>
        <label>Lon <input type="number" id="fly-lon" step="0.0001" value="24.8900" /></label>
      </div>
      <button id="fly-btn">🚀 Fly</button>
    </section>

    <section class="panel-section">
      <h3>Speed</h3>
      <div class="input-row">
        <input type="range" id="speed-slider" min="1" max="100" value="10" />
        <span id="speed-value">10 m/s</span>
      </div>
    </section>

    <section class="panel-section">
      <h3>Waypoints</h3>
      <div class="input-row">
        <label>Drone <select id="wp-drone-select"></select></label>
      </div>
      <div class="input-row">
        <label>Lat <input type="number" id="wp-lat" step="0.0001" value="60.1620" /></label>
        <label>Lon <input type="number" id="wp-lon" step="0.0001" value="24.8900" /></label>
      </div>
      <div class="button-row">
        <button id="add-wp-btn">+ Add</button>
        <button id="clear-wp-btn">Clear</button>
        <button id="fly-wp-btn">▶ Fly Waypoints</button>
      </div>
      <ul id="waypoint-list"></ul>
    </section>

    <section class="panel-section">
      <h3>Surveillance Area</h3>
      <div class="input-row">
        <label>Lat <input type="number" id="poly-lat" step="0.0001" value="60.1620" /></label>
        <label>Lon <input type="number" id="poly-lon" step="0.0001" value="24.8900" /></label>
      </div>
      <div class="button-row">
        <button id="add-poly-point-btn" style="flex:1">+ Add Point</button>
        <button id="poly-pick-btn" class="pick-btn">🎯 Pick</button>
      </div>
      <ul id="polygon-point-list"></ul>
      <div class="button-row" style="margin-top:6px">
        <button id="create-poly-btn" disabled>✔ Create</button>
        <button id="remove-poly-btn">✕ Remove</button>
      </div>
    </section>

    <section class="panel-section">
      <h3>Nav Corridors</h3>
      <button id="new-corridor-btn">+ New Corridor</button>
      <div class="input-row" style="margin-top:6px">
        <label>Corridor <select id="corridor-select"></select></label>
      </div>
      <div class="input-row">
        <label>Lat <input type="number" id="corridor-lat" step="0.0001" value="60.1620" /></label>
        <label>Lon <input type="number" id="corridor-lon" step="0.0001" value="24.8900" /></label>
      </div>
      <div class="button-row" style="margin-top:4px">
        <button id="add-corridor-point-btn" style="flex:1">+ Add Point</button>
        <button id="corridor-pick-btn" class="pick-btn">🎯 Pick</button>
      </div>
      <ul id="corridor-point-list"></ul>
      <div class="button-row" style="margin-top:6px">
        <button id="create-corridor-btn" disabled>✔ Create</button>
        <button id="remove-corridor-btn">✕ Remove</button>
      </div>
      <div class="corridor-entry-exit" style="margin-top:8px">
        <div class="input-row">
          <label>Entry Lat <input type="number" id="corridor-entry-lat" step="0.0001" value="60.1620" /></label>
          <label>Entry Lon <input type="number" id="corridor-entry-lon" step="0.0001" value="24.8900" /></label>
        </div>
        <div class="button-row">
          <button id="set-corridor-entry-btn" style="flex:1">📍 Set Entry</button>
          <button id="corridor-entry-pick-btn" class="pick-btn">🎯 Pick</button>
        </div>
        <div class="input-row" style="margin-top:6px">
          <label>Exit Lat <input type="number" id="corridor-exit-lat" step="0.0001" value="60.1620" /></label>
          <label>Exit Lon <input type="number" id="corridor-exit-lon" step="0.0001" value="24.8900" /></label>
        </div>
        <div class="button-row">
          <button id="set-corridor-exit-btn" style="flex:1">📍 Set Exit</button>
          <button id="corridor-exit-pick-btn" class="pick-btn">🎯 Pick</button>
        </div>
        <div id="corridor-entry-exit-display" class="entry-exit-info"></div>
        <button id="clear-corridor-entry-exit-btn" class="clear-btn" style="width:100%;margin-top:6px">✕ Clear Points</button>
      </div>
      <ul id="corridor-list"></ul>
    </section>

    <section class="panel-section">
      <h3>Entry / Exit Points</h3>
      <div class="input-row">
        <label>Entry Lat <input type="number" id="entry-lat" step="0.0001" value="60.1620" /></label>
        <label>Entry Lon <input type="number" id="entry-lon" step="0.0001" value="24.8900" /></label>
      </div>
      <div class="button-row">
        <button id="set-entry-btn" style="flex:1">📍 Set Entry</button>
        <button id="entry-pick-btn" class="pick-btn">🎯 Pick</button>
      </div>
      <div class="input-row" style="margin-top:6px">
        <label>Exit Lat <input type="number" id="exit-lat" step="0.0001" value="60.1620" /></label>
        <label>Exit Lon <input type="number" id="exit-lon" step="0.0001" value="24.8900" /></label>
      </div>
      <div class="button-row">
        <button id="set-exit-btn" style="flex:1">📍 Set Exit</button>
        <button id="exit-pick-btn" class="pick-btn">🎯 Pick</button>
      </div>
      <div id="entry-exit-display" class="entry-exit-info"></div>
      <button id="clear-entry-exit-btn" class="clear-btn" style="width:100%;margin-top:6px">✕ Clear Points</button>
    </section>

    <section class="panel-section">
      <h3>Status</h3>
      <div id="status-display"></div>
    </section>

    <section class="panel-section">
      <h3>Backend</h3>
      <div id="ws-status">Disconnected</div>
    </section>

    <section class="panel-section">
      <h3>Configuration</h3>
      <div class="button-row">
        <button id="download-config-btn">📥 Download</button>
        <button id="load-config-btn">📂 Load</button>
      </div>
      <input type="file" id="config-file-input" accept=".zip" style="display:none" />
    </section>

    <section class="panel-section">
      <button id="reset-sim-btn" class="danger-btn">⟲ Reset Simulator</button>
    </section>
  </div>

  <div id="picker-tooltip"></div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
